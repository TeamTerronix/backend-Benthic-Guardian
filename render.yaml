# Render Blueprint — deploy from the backend repo root only.
# Requires model/ with PINN weights (see model/README in repo).

services:
  - type: web
    name: sliot-backend
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: CUDA_VISIBLE_DEVICES
        value: "-1"
