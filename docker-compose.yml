services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://sliot_user:change_me@db:5432/sliot
      SECRET_KEY: replace-with-a-long-random-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sliot_user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: sliot
    ports:
      - "5432:5432"
    volumes:
      - sliot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sliot_user -d sliot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sliot_pgdata:
